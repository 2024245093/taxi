<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 택시 파티원 구하기 773</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="signup.css">
    <script src="signup.js"></script>
</head>

<body>
    <h3 id="main_title">회원가입</h3>
    <h4 id="caution_msg">(한번 잃어버린 계정은 복구할 수 없으므로 메모하는거 추천합니다)</h4>
    <div id="id_div">
        <input type="text" id="signupId" placeholder="중대와 이름 입력 ex) 1 홍길동"> <p id="if_hq_reference">만약 본부면 0 홍길동</p>
    </div>
    <br>
    <input type="password" id="signupPw" placeholder="비밀번호">
    <br>
    <input type="text" id="signupPhone" placeholder="전화번호 ex) 010xxxxxxxx (- 없이 입력)">
    <br>
    <input type="text" id="signupCaptain" placeholder="직속상관 관등성명 ex) 대위 홍길동"> <p id="comment_msg">(실제 관등성명 사용으로 바뀌었습니다.)</p>
    <br>
    <button onclick="signup()" id="signupBtn">회원가입</button>
</body>

</html>
