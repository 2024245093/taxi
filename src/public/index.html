<!DOCTYPE html>
<html>
<head>
    <!-- 전역 D-292... 집 보내줘 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>택시 파티원 구하기 사이트 773</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="top-bar">
        <h1 id="main_title">택시 파티원 구하기 사이트(773)</h1>
        <div class="top-bar-right">
            <span id="user_id" class="top-username"></span>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
    </div>

    <!-- 예약 검색 바 -->
    <div class="search-bar">
        <span class="search-label">예약 검색</span>
        <div class="search-filters">
            <select id="filter-purpose" class="filter-select">
                <option value="">출타/복귀</option>
                <option value="출타">출타</option>
                <option value="복귀">복귀</option>
            </select>
            <span class="filter-sep">-</span>
            <select id="filter-station" class="filter-select">
                <option value="">역 전체</option>
                <option value="용문역">용문역</option>
                <option value="여주역">여주역</option>
                <option value="양평역">양평역</option>
                <option value="여주터미널">여주터미널</option>
            </select>
            <span class="filter-sep">-</span>
            <select id="filter-time" class="filter-select">
                <option value="">시간 전체</option>
            </select>
        </div>
        <button class="search-btn" onclick="searchReservations()">검색</button>
    </div>

    <h2>
        <button onclick="prevMonth()">◀</button>
        <span id="monthTitle"></span>
        <button onclick="nextMonth()">▶</button>
    </h2>
    <div class="calendar-wrapper">
        <table id="calendar"></table>
    </div>

    <!-- 팝업 오버레이 -->
    <div id="popup-overlay" class="popup-overlay" style="display:none" onclick="onOverlayClick(event)">
        <div class="popup-card">

            <!-- Step 0: 예약 정보 보기 -->
            <div id="step0" style="display:none">
                <p class="popup-title" id="step0-date"></p>
                <div class="res-info-box">
                    <span id="step0-badge" class="purpose-badge"></span>
                    <p id="step0-detail"></p>
                    <button id="chat-enter-btn" class="chat-enter-btn" onclick="enterRoom()">💬 대화방 입장</button>
                    <button id="dissolve-btn" class="dissolve-btn" onclick="toggleDissolveVote()" style="display:none"><span class="dissolve-label">파티 해산</span><span id="dissolve-count" class="dissolve-count"></span></button>
                    <button id="early-party-btn" class="early-party-btn" onclick="toggleEarlyVote()" style="display:none"><span class="early-party-label">현재 인원만으로 파티 완성</span><span id="early-party-count" class="early-party-count"></span></button>
                    <button id="delete-btn">예약 삭제</button>
                </div>
                <button class="popup-back-btn" onclick="closePopup()">닫기</button>
            </div>

            <!-- Step 1: 출타 / 복귀 -->
            <div id="step1" style="display:none">
                <p class="popup-title">택시 사용 용무 고르세요</p>
                <div class="popup-btn-group">
                    <button class="popup-big-btn" onclick="selectPurpose('출타')">
                        출타
                        <span class="popup-btn-sub">출발지 → 역</span>
                    </button>
                    <button class="popup-big-btn" onclick="selectPurpose('복귀')">
                        복귀
                        <span class="popup-btn-sub">역 → 도착지</span>
                    </button>
                </div>
            </div>

            <!-- Step 2: 역 선택 -->
            <div id="step2" style="display:none">
                <p class="popup-title" id="step2-title">목적지 선택</p>
                <div class="popup-btn-group">
                    <button class="popup-big-btn" onclick="selectStation('용문역')">용문역</button>
                    <button class="popup-big-btn" onclick="selectStation('여주역')">여주역</button>
                    <button class="popup-big-btn" onclick="selectStation('양평역')">양평역</button>
                    <button class="popup-big-btn" onclick="selectStation('여주터미널')">여주터미널</button>
                </div>
                <button class="popup-back-btn" onclick="goStep(1)">← 뒤로</button>
            </div>

            <!-- Step 3: 시간 선택 -->
            <div id="step3" style="display:none">
                <p class="popup-title">시간 선택</p>
                <p class="popup-subtitle" id="step3-subtitle"></p>
                <div class="wheel-container">
                    <div class="wheel-highlight"></div>
                    <div class="wheel-track" id="timePicker"></div>
                </div>
                <button class="popup-confirm-btn" onclick="confirmSelection()">확인</button>
                <button class="popup-back-btn" onclick="goStep(2)">← 뒤로</button>
            </div>

        </div>
    </div>

    <!-- 파티 완성 팝업 -->
    <div id="party-overlay" class="party-overlay" style="display:none">
        <div class="party-card">
            <div class="party-emoji">🎉</div>
            <h3 class="party-title">파티 완성!</h3>
            <p class="party-info" id="party-info"></p>
            <p class="party-question">파티 구성에 찬성하시겠습니까?</p>
            <p class="party-question">구성원간의 원활한 소통과 신분 확인을 위해 전화번호를 공개하겠습니다</p>
            <div class="party-btn-group">
                <button class="party-agree-btn" onclick="respondParty(true)">찬성</button>
                <button class="party-refuse-btn" onclick="respondParty(false)">반대 (예약 취소)</button>
            </div>
        </div>
    </div>
    <div id=buttons_div>
        <button id="website_instruction" onclick="location.href='instruction.html'">웹사이트 안내</button>
        <button id="patchnote" onclick="location.href='patchnote.html'">패치노트</button>
        <button id="suggestion" onclick="location.href='suggestion.html'">질문/건의사항</button>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
