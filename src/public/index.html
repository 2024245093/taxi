<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxi - 택시 파트너 찾기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 15px;
      font-size: 2.5em;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    a {
      flex: 1;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid #667eea;
    }
    .btn-login {
      background: #667eea;
      color: white;
    }
    .btn-login:hover {
      background: #764ba2;
      border-color: #764ba2;
    }
    .btn-signup {
      background: white;
      color: #667eea;
    }
    .btn-signup:hover {
      background: #f0f0f0;
    }
    .status {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 0.9em;
      color: #999;
    }
    .status-ok {
      color: #27ae60;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚕 Taxi</h1>
    <p class="subtitle">택시 파트너 찾기 서비스</p>
    
    <p style="color: #555; margin-bottom: 20px;">
      같은 방향으로 가는 사람들과<br>
      함께 택시를 나눠타고 비용을 절약하세요.
    </p>

    <div class="button-group">
      <a href="/login" class="btn-login">로그인</a>
      <a href="/signup" class="btn-signup">회원가입</a>
    </div>

    <div class="status">
      <p class="status-ok">✓ 서버 정상 작동 중</p>
    </div>
  </div>
</body>
</html>
