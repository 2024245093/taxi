<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파티 대화방 - 택시 파티원 구하기 773</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button class="back-btn" onclick="location.href='index.html'">◀ 달력</button>
            <div class="chat-header-info">
                <span class="chat-title">파티 대화방</span>
                <span class="chat-subtitle" id="room-info"></span>
            </div>
            <button class="menu-btn" onclick="togglePeoplePanel()">☰</button>
        </div>

        <div class="people-panel" id="people-panel" style="display:none">
            <div class="people-panel-title">참여자 정보</div>
            <div class="people-list" id="people-list"></div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="chat-loading" id="chat-loading">불러오는 중...</div>
        </div>

        <div class="survey-bar" id="survey-bar">
            <p class="survey-title">이용 완료 여부 및 만족도 조사받습니다</p>
            <p class="survey-sub">완료되었고 만족스러웠다면 O, 불만족스러웠다면 X를 선택해주세요</p>
            <div class="survey-btns">
                <button class="survey-o" onclick="selectSurvey(true)">O</button>
                <button class="survey-x" onclick="selectSurvey(false)">X</button>
            </div>
            <div class="survey-reason-wrap" id="survey-reason-wrap" style="display:none">
                <textarea id="survey-reason" class="survey-reason-input" placeholder="불만족 사유를 입력해주세요..." maxlength="300" rows="2"></textarea>
                <button class="survey-submit-btn" onclick="submitSurvey()">제출</button>
            </div>
        </div>

        <div class="chat-input-bar">
            <textarea id="msg-input" class="msg-input" placeholder="메시지 입력..." maxlength="500" rows="1"></textarea>
            <button class="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
</body>
</html>
